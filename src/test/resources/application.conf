# Reference configuration for local testing
app {
  environment = "test"
  name = "deloai-ecom-clickstream-etl-test"
}

spark {
  master = "local[*]"
  app-name = "EcomClickstreamPipelineTest"
  properties = {
    "spark.sql.shuffle.partitions" = "4"
    "spark.ui.enabled" = "false"
  }
}

hdfs {
  uri = "file:///"
  input-base-path = "src/test/resources/data/input"
  output-clean-path = "target/test-output/clean"
  output-agg-path = "target/test-output/agg"
}
