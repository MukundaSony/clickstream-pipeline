app {
  environment = "prod"
  name = "deloai-ecom-clickstream-etl"
}

spark {
  master = "yarn"
  app-name = "EcomClickstreamPipeline"
  properties = {
    "spark.sql.shuffle.partitions" = "500"
    "spark.executor.memory" = "16g"
    "spark.executor.cores" = "4"
    "spark.driver.memory" = "8g"
    "spark.dynamicAllocation.enabled" = "true"
    "spark.dynamicAllocation.minExecutors" = "10"
    "spark.dynamicAllocation.maxExecutors" = "50"
    "spark.yarn.queue" = "high_priority_etl"
    "spark.sql.parquet.compression.codec" = "snappy"
  }
}

hdfs {
  uri = "hdfs://prod-hadoop-nn01.deloai.internal:8020"
  input-base-path = "/warehouse/client/ecom/raw/clickstream"
  output-clean-path = "/warehouse/client/ecom/processed/clean_clickstream"
  output-agg-path = "/warehouse/client/ecom/analytics/daily_user_summary"
}
